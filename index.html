<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동물상 테스트 & 로또 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    
    <section class="animal-test-section">
      <h1>동물상 테스트</h1>
      <p class="subtitle">사진을 업로드하여 당신의 동물상을 확인하세요</p>
      
      <div class="upload-area" id="upload-area">
        <input type="file" id="image-upload" accept="image/*" class="hidden">
        <label for="image-upload" class="upload-label">
          <div id="image-preview-container" class="image-preview-container">
            <span id="upload-icon">📷</span>
            <p id="upload-text">사진 업로드 (클릭 또는 드래그)</p>
            <img id="image-preview" src="#" alt="Preview" class="hidden">
          </div>
        </label>
      </div>

      <div id="label-container" class="label-container"></div>
      <div id="loading-spinner" class="hidden">AI 분석 중...</div>
    </section>

    <hr class="section-divider">

    <section class="lotto-section">
      <h2>로또 번호 생성기</h2>
      <div id="lotto-numbers" class="lotto-numbers"></div>
      <button id="generate-btn" class="secondary-btn">번호 생성</button>
    </section>

    <section class="contact-section">
      <hr>
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/xeelbblz" method="POST">
        <div class="form-group">
          <input type="email" name="email" placeholder="이메일 주소" required>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="문의 내용" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
      </form>
    </section>

    <section class="comments-section">
      <hr>
      <div id="disqus_thread"></div>
      <script>
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://product-builder-test01.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
