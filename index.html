<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <h1>로또 번호 생성기</h1>
    <div id="lotto-numbers" class="lotto-numbers"></div>
    <button id="generate-btn">번호 생성</button>

    <div class="contact-section">
      <hr>
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/xeelbblz" method="POST">
        <div class="form-group">
          <input type="email" name="email" placeholder="이메일 주소" required>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="문의 내용" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
      </form>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
